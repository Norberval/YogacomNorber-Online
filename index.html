<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YôgacomNorber – Controle de Alunos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#0f0e0c;--surface:#1a1815;--surface2:#232018;--border:#2e2a22;
  --gold:#c9a84c;--gold-light:#e2c47a;--gold-dim:rgba(201,168,76,0.15);
  --green:#4caf7a;--green-dim:rgba(76,175,122,0.15);
  --red:#e05252;--red-dim:rgba(224,82,82,0.12);
  --text:#f0ead8;--text-muted:#8a8070;--text-dim:#5a5448;
  --personal:#7c5cbf;--online:#3a8fd4;--sabado:#d4823a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── TELA DE SENHA ── */
#lockScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.lock-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px 36px;
  width:100%;max-width:340px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.lock-symbol{font-family:'Cormorant Garamond',serif;font-size:44px;color:var(--gold);line-height:1;}
.lock-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--text);text-align:center;}
.lock-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-top:-10px;}
.lock-input{
  width:100%;padding:12px 16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:20px;
  letter-spacing:6px;text-align:center;outline:none;
  transition:border-color .2s;
}
.lock-input:focus{border-color:var(--gold);}
.lock-input.erro{border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-btn{
  width:100%;padding:12px;border-radius:10px;border:none;
  background:var(--gold);color:#1a1206;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .2s;
}
.lock-btn:hover{background:var(--gold-light);}
.lock-erro{font-size:12px;color:var(--red);min-height:16px;}

/* NAV TABS */
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;gap:4px;position:sticky;top:0;z-index:99;}
.nav-tab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-symbol{
  font-family:'Tiro Devanagari Sanskrit',serif;
  font-size:38px;
  line-height:1;
  background: linear-gradient(160deg,#f7e96a 0%,#d4a030 18%,#f0d055 35%,#8a5510 50%,#e2b840 64%,#7a4a08 78%,#f0c83a 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0px 3px 6px rgba(60,25,0,0.85)) drop-shadow(0px 1px 2px rgba(255,200,60,0.3));
  display:inline-block;
}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;}
.logo-text span{color:var(--gold);}

/* OM na tela de senha */
.lock-symbol{
  font-family:'Tiro Devanagari Sanskrit',serif;
  font-size:86px;
  line-height:1;
  background: linear-gradient(160deg,#f7e96a 0%,#d4a030 18%,#f0d055 35%,#8a5510 50%,#e2b840 64%,#7a4a08 78%,#f0c83a 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0px 5px 12px rgba(40,15,0,0.9)) drop-shadow(0px 1px 3px rgba(255,210,60,0.35));
  display:inline-block;
}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .2s;}
.btn-primary{background:var(--gold);color:#1a1206;}
.btn-primary:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

/* STATS */
.stats-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.stat{flex:1;padding:12px 16px;background:var(--surface);display:flex;flex-direction:column;gap:2px;min-width:100px;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}

/* FILTER */
.filter-bar{padding:12px 24px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.filter-chip:hover,.filter-chip.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.search-box{margin-left:auto;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:190px;outline:none;}
.search-box:focus{border-color:var(--gold);}
.search-box::placeholder{color:var(--text-dim);}

/* BOARD */
.board{display:flex;gap:14px;padding:18px 24px;overflow-x:auto;min-height:calc(100vh - 260px);align-items:flex-start;}
.column{min-width:290px;max-width:290px;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.column-header{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.col-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;flex:1;}
.col-count{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:11px;color:var(--text-muted);}
.col-personal{border-top:3px solid var(--personal);}
.col-personal .col-title{color:var(--personal);}
.col-tercas{border-top:3px solid var(--online);}
.col-tercas .col-title{color:var(--online);}
.col-sabados{border-top:3px solid var(--sabado);}
.col-sabados .col-title{color:var(--sabado);}
.column-cards{padding:10px;display:flex;flex-direction:column;gap:8px;}

/* CARD */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.4);}
.card-banner{height:50px;background:linear-gradient(135deg,#1a1206,#2a2010,#1a1206);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,.08),transparent 70%);}
.card-banner-text{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  font-weight:600;
  letter-spacing:.05em;
  position:relative;
  background: linear-gradient(160deg,#f5e070 0%,#c9913a 20%,#e8c84a 38%,#a06820 52%,#e2b840 65%,#8a5510 78%,#f0d060 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0px 2px 4px rgba(60,30,0,0.7));
}
.card-body{padding:10px 12px;}
.card-status{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.status-active{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,122,.3);}
.status-ending{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.3);}
.status-new{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.3;}
.progress-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s;}
.progress-fill.warning{background:var(--gold);}
.progress-fill.danger{background:var(--red);}
.progress-text{font-size:11px;color:var(--text-muted);white-space:nowrap;}
.card-value{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold);}
.add-card-btn{margin:0 10px 10px;padding:7px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;width:calc(100% - 20px);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.add-card-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.empty-col{text-align:center;padding:24px 12px;color:var(--text-dim);font-size:12px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;visibility:hidden;transition:all .2s;}
.modal-overlay.open{opacity:1;visibility:visible;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;flex:1;}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;}
.form-row .form-group{flex:1;min-width:130px;}
label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);}
input,select,textarea{padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:70px;}

/* CHECKLIST in modal */
.checklist-section{border-top:1px solid var(--border);padding-top:14px;}
.checklist-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.aula-list{display:flex;flex-direction:column;gap:5px;}
.aula-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;}
.aula-item input[type="checkbox"]{width:15px;height:15px;flex-shrink:0;accent-color:var(--green);cursor:pointer;}
.aula-item-label{flex:1;font-size:13px;}
.aula-item-label.done{text-decoration:line-through;color:var(--text-dim);}
.aula-date-input{padding:4px 8px;font-size:11px;width:130px;flex-shrink:0;}

/* DETAIL */
.detail-banner{height:72px;background:linear-gradient(135deg,#1a1206,#2a2010,#1a1206);display:flex;align-items:center;justify-content:center;position:relative;}
.detail-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 50%,rgba(201,168,76,.12),transparent 70%);}
.detail-banner-text{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  position:relative;
  background: linear-gradient(160deg,#f5e070 0%,#c9913a 20%,#e8c84a 38%,#a06820 52%,#e2b840 65%,#8a5510 78%,#f0d060 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0px 2px 6px rgba(60,30,0,0.8));
}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:12px;color:var(--text-muted);}
.detail-val{font-size:13px;color:var(--text);font-weight:500;}
.progress-detail{margin:10px 0;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;}
.progress-header{display:flex;justify-content:space-between;margin-bottom:7px;font-size:12px;}
.checklist-full{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.check-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:7px;border:1px solid var(--border);}
.check-row input[type="checkbox"]{accent-color:var(--green);width:14px;height:14px;cursor:pointer;}
.check-row span{font-size:13px;flex:1;}
.check-row span.done{text-decoration:line-through;color:var(--text-dim);}
.check-date-badge{font-size:11px;color:var(--text-muted);background:var(--surface2);padding:2px 6px;border-radius:4px;white-space:nowrap;}
.btn-delete{background:transparent;border:1px solid var(--border);color:var(--red);padding:7px 12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.btn-delete:hover{background:var(--red-dim);border-color:var(--red);}
.btn-edit{background:var(--gold-dim);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.btn-edit:hover{background:rgba(201,168,76,.25);}
.btn-renovar{background:var(--green-dim);border:1px solid rgba(76,175,122,.3);color:var(--green);padding:7px 12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.btn-renovar:hover{background:rgba(76,175,122,.2);}

/* ABAS INTERNAS DO DETALHE */
.dtab{padding:10px 14px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.dtab:hover{color:var(--text);}
.dtab-active{color:var(--gold)!important;border-bottom-color:var(--gold)!important;}

/* HISTÓRICO */
.hist-block{margin-top:14px;}
.hist-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.hist-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.hist-item-header{display:flex;justify-content:space-between;margin-bottom:4px;}
.hist-pacote{font-size:13px;font-weight:500;color:var(--text);}
.hist-valor{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);}
.hist-meta{font-size:11px;color:var(--text-muted);}
.hist-progress{display:flex;align-items:center;gap:8px;margin-top:6px;}

/* OM SVG inline */
.om-svg-sm { width:36px; height:36px; display:inline-block; vertical-align:middle; }
.om-svg-lg { width:80px; height:80px; display:inline-block; }
.om-svg-md { width:28px; height:28px; display:inline-block; vertical-align:middle; }
.btn-ordem{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:1px 3px;line-height:1;transition:color .15s;}
.btn-ordem:hover{color:var(--gold);}
.btn-step{
  min-width:40px;min-height:44px;
  padding:0 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--gold);
  font-size:22px;
  font-weight:300;
  cursor:pointer;
  line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  flex-shrink:0;
}
.btn-step:active{background:var(--gold-dim);}
.btn-step-left{border-right:none;border-radius:8px 0 0 8px;}
.btn-step-right{border-left:none;border-radius:0 8px 8px 0;}
.step-input{border-radius:0;text-align:center;-moz-appearance:textfield;-webkit-appearance:none;min-width:60px;flex:1;}
.step-input::-webkit-inner-spin-button,.step-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.relatorio-page{padding:20px 24px;display:none;}
.relatorio-page.active{display:block;}
.rel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.rel-title{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);}
.rel-controls{display:flex;gap:8px;}
.mes-select{padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.mes-select:focus{border-color:var(--gold);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:4px;}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold);}
.kpi-label{font-size:11px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.kpi-sub{font-size:12px;color:var(--text-dim);margin-top:2px;}
.rel-section-title{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.rel-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
.rel-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);}
.rel-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
.rel-table tr:last-child td{border-bottom:none;}
.rel-table tr:hover td{background:var(--surface2);}
.tipo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.tipo-personal{background:rgba(124,92,191,.15);color:#a07de8;}
.tipo-tercas{background:rgba(58,143,212,.15);color:#6ab3e8;}
.tipo-sabados{background:rgba(212,130,58,.15);color:#e8a06a;}
.bar-chart{margin-bottom:24px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-name{font-size:12px;color:var(--text-muted);width:120px;flex-shrink:0;text-align:right;}
.bar-wrap{flex:1;height:22px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;font-weight:600;color:#1a1206;transition:width .5s;}
.bar-total{font-size:12px;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:15px;width:70px;}
.no-data{text-align:center;padding:40px;color:var(--text-dim);font-size:14px;}

/* RENOVAR MODAL */
.renov-info{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text-muted);line-height:1.6;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:600px){
  header{padding:12px 14px;}
  .board{padding:12px 8px;gap:10px;}
  .column{min-width:260px;max-width:260px;}
  .stats-bar{overflow-x:auto;}
  .stat{min-width:90px;}

function stepField(id, step, min, max){
  const el = document.getElementById(id);
  let val = parseFloat(el.value) || 0;
  val = Math.min(max, Math.max(min, val + step));
  el.value = val;
  // disparar onchange se existir (para gerarAulas no campo de qtd)
  el.dispatchEvent(new Event('change'));
}

// Modal de novo quadro — inline simples
function abrirNovoQuadro(){
  const nome = prompt('Nome do novo quadro:\n(Ex: Segundas e Quartas)');
  if(!nome || !nome.trim()) return;
  const icones = ['📅','🗓️','🌅','🌙','⭐','🔵','🟢','🟠','🟣'];
  const icone = icones[quadros.length % icones.length];
  const cor = PALETA[(quadros.length - 3) % PALETA.length];
  const id = 'q_' + nome.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'') + '_' + Date.now().toString(36);

  saveQuadros();
  renderBoard();
  renderAll();
  atualizarSelectTipo(id);
  // abre o modal de novo aluno já nesse quadro
  openNewModal(id);
}

// ─────────────── REORDENAÇÃO ───────────────
function moverQuadro(id, dir){
  const i = quadros.findIndex(q=>q.id===id);
  const j = i + dir;
  if(j<0 || j>=quadros.length) return;
  [quadros[i], quadros[j]] = [quadros[j], quadros[i]];
  saveQuadros();
  renderBoard();
  renderAll();
}

function moverAluno(id, dir){
  // dir: -1=cima, 1=baixo, -999=início, 999=final
  const a = alunos.find(x=>x.id===id);
  const tipo = a.tipo;
  // pegar só alunos do mesmo quadro na ordem atual
  const doQuadro = alunos.filter(x=>x.tipo===tipo);
  const i = doQuadro.findIndex(x=>x.id===id);
  let j;
  if(dir === -999) j = 0;
  else if(dir === 999) j = doQuadro.length - 1;
  else j = i + dir;
  if(j<0 || j>=doQuadro.length || j===i) return;

  // reordenar dentro do array global
  const idxGlobalI = alunos.indexOf(doQuadro[i]);
  const idxGlobalJ = alunos.indexOf(doQuadro[j]);
  [alunos[idxGlobalI], alunos[idxGlobalJ]] = [alunos[idxGlobalJ], alunos[idxGlobalI]];

  // salvar ordem no Firebase — gravar campo 'ordem' em cada aluno do quadro
  const atualizados = alunos.filter(x=>x.tipo===tipo);
  atualizados.forEach((al, oi)=>{ al.ordem = oi; save(al); });

  renderAll();
}

function excluirQuadro(id){
  const q = quadros.find(x=>x.id===id);
  const nAlunos = alunos.filter(a=>a.tipo===id).length;
  const aviso = nAlunos > 0 ? ` (há ${nAlunos} aluno(s) neste quadro que ficará sem quadro)` : '';
  confirmar(
    `Excluir o quadro "${q.nome}"?${aviso}`,
    ()=>{ quadros=quadros.filter(x=>x.id!==id); saveQuadros(); renderBoard(); renderAll(); }
  );
}

// Salva um aluno no Firestore
async function save(aluno){
  if(!aluno) return;
  await db.collection('alunos').doc(aluno.id).set(aluno);
}

// Salva os quadros no Firestore
async function saveQuadrosDB(){
  await db.collection('config').doc('quadros').set({ lista: quadros });

// Carrega todos os dados do Firestore
async function carregarDados(){
  mostrarCarregando(true);
  try {
    // Carregar quadros
    const qDoc = await db.collection('config').doc('quadros').get();
    if(qDoc.exists && qDoc.data().lista){
      quadros = qDoc.data().lista;
    }

    // Carregar alunos
    const snap = await db.collection('alunos').get();
    alunos = snap.docs.map(d => d.data());
  } catch(e){
    console.error('Erro ao carregar Firebase:', e);
    alert('Erro ao conectar com o banco de dados. Verifique sua conexão.');
  }
  mostrarCarregando(false);
  renderBoard();
  renderAll();
}

// ─────────────── RENDER BOARD ───────────────
// Cores fixas para os quadros fixos, paleta para os novos
const CORES_FIXAS = {personal:'#7c5cbf', tercas:'#3a8fd4', sabados:'#d4823a'};
const PALETA = ['#4caf7a','#e05252','#c9a84c','#5bbfbf','#bf5b9a','#7c9abf','#bf7c5b'];

function corDoQuadro(tipo){
  if(CORES_FIXAS[tipo]) return CORES_FIXAS[tipo];
  const q = quadros.find(q=>q.id===tipo);
  return q ? q.cor : '#8a8070';
}

function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  quadros.forEach((q, qi)=>{
    const cor = corDoQuadro(q.id);
    const col = document.createElement('div');
    col.className = 'column';
    col.style.borderTop = `3px solid ${cor}`;
    col.id = 'col-'+q.id;

    const isFixo = ['personal','tercas','sabados'].includes(q.id);
    const deleteBtnHtml = isFixo ? '' :
      `<button class="btn-ordem" onclick="excluirQuadro('${q.id}')" title="Excluir quadro"
        onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-dim)'">✕</button>`;

    const podeSubir  = qi > 0;
    const podeDescer = qi < quadros.length - 1;

    col.innerHTML = `
      <div class="column-header">
        <span style="font-size:15px;">${q.icone||'📅'}</span>
        <span class="col-title" style="color:${cor};flex:1;">${q.nome}</span>
        <span class="col-count" id="count-${q.id}">0</span>
        <button class="btn-ordem" onclick="moverQuadro('${q.id}',-1)" title="Mover para esquerda" ${podeSubir?'':'disabled style="opacity:0.2;"'}>◀</button>
        <button class="btn-ordem" onclick="moverQuadro('${q.id}',1)"  title="Mover para direita" ${podeDescer?'':'disabled style="opacity:0.2;"'}>▶</button>
        ${deleteBtnHtml}
      </div>
      <div class="column-cards" id="cards-${q.id}"></div>
      <button class="add-card-btn" onclick="openNewModal('${q.id}')">＋ Adicionar</button>`;
    board.appendChild(col);
  });

  // botão "＋ Novo quadro" no final
  const addCol = document.createElement('div');
  addCol.style.cssText = 'min-width:220px;display:flex;align-items:flex-start;padding-top:4px;';
  addCol.innerHTML = `
    <button onclick="abrirNovoQuadro()"
      style="width:100%;padding:12px 16px;border-radius:12px;border:2px dashed var(--border);
             background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;
             font-size:13px;cursor:pointer;transition:all .2s;text-align:left;"
      onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'"
      onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
      ＋ Novo quadro
    </button>`;
  board.appendChild(addCol);
}

function renderAll(){
  const search = document.getElementById('searchBox').value.toLowerCase();

  // agrupar alunos por quadro
  const cols = {};
  quadros.forEach(q=>cols[q.id]=[]);

  alunos.forEach(a=>{
    if(search && !a.nome.toLowerCase().includes(search)) return;
    if(activeFilter!=='todos' && a.status!==activeFilter) return;
    if(cols[a.tipo]!==undefined) cols[a.tipo].push(a);
  });

  // respeitar ordem definida pelo usuário
  Object.keys(cols).forEach(k=>{
    cols[k].sort((a,b)=>(a.ordem??999)-(b.ordem??999));
  });

  quadros.forEach(q=>{
    const el = document.getElementById('cards-'+q.id);
    if(!el) return;
    el.innerHTML='';
    if(!cols[q.id].length) el.innerHTML='<div class="empty-col">Nenhum aluno aqui</div>';
    else cols[q.id].forEach(a=>el.appendChild(buildCard(a)));
    const cnt = document.getElementById('count-'+q.id);
    if(cnt) cnt.textContent = cols[q.id].length;
  });

  // stats
  document.getElementById('statTotal').textContent=alunos.length;
  document.getElementById('statPersonal').textContent=alunos.filter(a=>a.tipo==='personal').length;
  document.getElementById('statTercas').textContent=alunos.filter(a=>a.tipo==='tercas').length;
  document.getElementById('statSabados').textContent=alunos.filter(a=>a.tipo==='sabados').length;
  const rec=alunos.filter(a=>a.status==='ativo').reduce((s,a)=>s+(a.valor||0),0);
  document.getElementById('statReceita').textContent='R$'+rec.toLocaleString('pt-BR');
}

function buildCard(a){
  const done=a.aulas.filter(x=>x.done).length, total=a.aulas.length;
  const pct=total?Math.round(done/total*100):0;
  const fillClass=pct>=90?'danger':pct>=70?'warning':'';
  const statusMap={ativo:'status-active',encerrando:'status-ending',novo:'status-new'};
  const statusLabel={ativo:'● Pacote ativo',encerrando:'⚠ Encerrando',novo:'★ Novo'};

  // posição do aluno na coluna
  const doQuadro = alunos.filter(x=>x.tipo===a.tipo).sort((x,y)=>(x.ordem??999)-(y.ordem??999));
  const pos = doQuadro.findIndex(x=>x.id===a.id);
  const podeSubir  = pos > 0;
  const podeDescer = pos < doQuadro.length - 1;

  const div=document.createElement('div');
  div.className='card';
  div.innerHTML=`
    <div class="card-banner" style="cursor:pointer;" onclick="openDetail('${a.id}')">
      <div class="card-banner-text">ॐ YôgacomNorber</div>
    </div>
    <div class="card-body" style="cursor:pointer;" onclick="openDetail('${a.id}')">
      <div class="card-status ${statusMap[a.status]}">${statusLabel[a.status]}</div>
      <div class="card-name">${a.nome} – Pacote ${a.numPacote} (${a.qtdAulas} aulas)</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${pct}%"></div></div>
        <span class="progress-text">${done}/${total}</span>
      </div>
      <div class="card-value">R$: ${(a.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:2px;padding:4px 8px 6px;border-top:1px solid var(--border);">
      <button class="btn-ordem" onclick="moverAluno('${a.id}',-999)" title="Início" ${podeSubir?'':'disabled style="opacity:0.2;cursor:default;"'}>⇈</button>
      <button class="btn-ordem" onclick="moverAluno('${a.id}',-1)"   title="Mover para cima" ${podeSubir?'':'disabled style="opacity:0.2;cursor:default;"'}>↑</button>
      <button class="btn-ordem" onclick="moverAluno('${a.id}',1)"    title="Mover para baixo" ${podeDescer?'':'disabled style="opacity:0.2;cursor:default;"'}>↓</button>
      <button class="btn-ordem" onclick="moverAluno('${a.id}',999)"  title="Final" ${podeDescer?'':'disabled style="opacity:0.2;cursor:default;"'}>⇊</button>
    </div>`;
  return div;
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

function openNewModal(tipo){
  editingId=null;
  document.getElementById('modalTitle').textContent='Novo aluno';
  document.getElementById('f_nome').value='';
  atualizarSelectTipo(tipo || quadros[0].id);
  document.getElementById('f_status').value='ativo';
  document.getElementById('f_qtdAulas').value=8;
  document.getElementById('f_valor').value='';
  document.getElementById('f_dataPag').value=new Date().toISOString().split('T')[0];
  document.getElementById('f_numPacote').value=1;
  document.getElementById('f_obs').value='';
  gerarAulas();
  document.getElementById('newModal').classList.add('open');
}
function closeNewModal(){document.getElementById('newModal').classList.remove('open');}

function gerarAulas(){
  const qtd = parseInt(document.getElementById('f_qtdAulas').value) || 8;
  const list = document.getElementById('aulaList');

  // Capturar estado ATUAL do DOM antes de regenerar (preserva edições do usuário)
  const estadoAtual = [];
  const itemsAtual = list.querySelectorAll('.aula-item');
  itemsAtual.forEach((item, i) => {
    estadoAtual[i] = {
      done: item.querySelector('input[type="checkbox"]').checked,
      date: item.querySelector('input[type="date"]').value,
      nota: item.querySelector('input[type="text"]')?.value || ''
    };
  });

  // Se não há estado atual (primeira abertura), usar dados do Firebase
  const existing = editingId ? (alunos.find(a=>a.id===editingId)?.aulas || []) : [];

  list.innerHTML = '';
  for(let i = 0; i < qtd; i++){
    // Prioridade: estado atual do DOM > dados do Firebase > vazio
    const ex = estadoAtual[i] || existing[i] || {done:false, date:'', nota:''};
    const div = document.createElement('div');
    div.className = 'aula-item';
    div.style.flexDirection = 'column';
    div.style.alignItems = 'stretch';
    div.style.gap = '6px';
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="ck_${i}" ${ex.done?'checked':''} onchange="this.parentElement.nextElementSibling.querySelector('input').style.display=this.checked?'block':'block';this.parentElement.parentElement.querySelector('.aula-item-label').className='aula-item-label'+(this.checked?' done':'')">
        <span class="aula-item-label${ex.done?' done':''}">Aula ${i+1}</span>
        <input type="date" class="aula-date-input" id="dt_${i}" value="${ex.date||''}">
      </div>
      <input type="text" id="nt_${i}" placeholder="Observação da aula (ex: falta pagar)" value="${ex.nota||''}"
        style="font-size:11px;padding:5px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);width:100%;">`;
    list.appendChild(div);
  }
}

async function salvarAluno(){
  const nome=document.getElementById('f_nome').value.trim();
  if(!nome){alert('Informe o nome do aluno.');return;}
  const qtd=parseInt(document.getElementById('f_qtdAulas').value)||8;
  const aulas=[];
  for(let i=0;i<qtd;i++) aulas.push({
    label:`Aula ${i+1}`,
    done:document.getElementById(`ck_${i}`).checked,
    date:document.getElementById(`dt_${i}`).value,
    nota:document.getElementById(`nt_${i}`)?.value||''
  });
  const dados={nome,tipo:document.getElementById('f_tipo').value,status:document.getElementById('f_status').value,
    qtdAulas:qtd,valor:parseFloat(document.getElementById('f_valor').value)||0,
    dataPag:document.getElementById('f_dataPag').value,numPacote:parseInt(document.getElementById('f_numPacote').value)||1,
    obs:document.getElementById('f_obs').value,aulas};
  if(editingId){
    const idx=alunos.findIndex(a=>a.id===editingId);
    alunos[idx]={...alunos[idx],...dados};
    await save(alunos[idx]);
    const idEditado = editingId;
    closeNewModal();
    renderAll();
    openDetail(idEditado);
  } else {
    const novo={id:uid(),historico:[],...dados};
    alunos.push(novo);
    await save(novo);
    closeNewModal();
    renderAll();
  }
}

  const hist=a.historico||[];

  const checksHtml=a.aulas.map((au,i)=>`
    <div class="check-row" style="flex-direction:column;align-items:stretch;gap:5px;">
      <div style="display:flex;align-items:center;gap:8px;">

        <span class="${au.done?'done':''}">${au.label}</span>
        ${au.date?`<span class="check-date-badge">📅 ${fmtDate(au.date)}</span>`

  const histHtml = hist.length ? hist.slice().reverse().map((h,hi)=>{

        ${au.date
          ? `<span class="check-date-badge" style="cursor:pointer;" onclick="editHistData(this,'${id}',${hIdx},${ai})">📅 ${fmtDate(au.date)}</span>`
          : `<input type="date" style="padding:3px 7px;font-size:11px;width:135px;" value="" onchange="setHistAulaDate('${id}',${hIdx},${ai},this.value)">`}
      </div>`).join('')

    return `<div class="hist-item" id="histitem${hIdx}">

  document.getElementById('detailBody').innerHTML=`

    <div id="dpanel-historico" style="display:none;"><div class="hist-block">${histHtml}</div></div>`;

  document.getElementById('detailModal').classList.add('open');

function toggleHistAula(el){
  const alunoId = el.getAttribute('data-aluno');
  const hIdx    = parseInt(el.getAttribute('data-hIdx'));
  const ai      = parseInt(el.getAttribute('data-ai'));
  const a = alunos.find(x=>x.id===alunoId);
  a.historico[hIdx].aulas[ai].done = el.checked;
  if(el.checked && !a.historico[hIdx].aulas[ai].date)
    a.historico[hIdx].aulas[ai].date = new Date().toISOString().split('T')[0];
  a.historico[hIdx].aulasConcluidas = a.historico[hIdx].aulas.filter(x=>x.done).length;
  save(a);
  const span = el.nextElementSibling;
  if(span) span.className = el.checked ? 'done' : '';
}

function setHistAulaDate(alunoId, hIdx, ai, val){
  const a = alunos.find(x=>x.id===alunoId);
  a.historico[hIdx].aulas[ai].date = val;
  save(a);
}

function editHistData(badge, alunoId, hIdx, ai){
  // troca o badge por um input de data para edição
  const a = alunos.find(x=>x.id===alunoId);
  const atual = a.historico[hIdx].aulas[ai].date || '';
  const input = document.createElement('input');
  input.type='date'; input.value=atual;
  input.style.cssText='padding:3px 7px;font-size:11px;width:135px;background:var(--surface2);border:1px solid var(--gold);border-radius:6px;color:var(--text);';
  input.onchange = function(){
    a.historico[hIdx].aulas[ai].date = this.value;
    save(a);
    // volta ao badge
    const novo = document.createElement('span');
    novo.className='check-date-badge';
    novo.style.cursor='pointer';
    novo.textContent='📅 '+fmtDate(this.value);
    novo.onclick = ()=>editHistData(novo, alunoId, hIdx, ai);
    this.replaceWith(novo);
  };
  badge.replaceWith(input);
  input.focus();
}

function excluirHistorico(btn){
  const alunoId = btn.getAttribute('data-aluno');
  const hIdx    = parseInt(btn.getAttribute('data-hIdx'));
  const a = alunos.find(x=>x.id===alunoId);
  const h = a.historico[hIdx];
  confirmar(
    `Excluir Pacote ${h.numPacote} (${h.qtdAulas} aulas, R$ ${(h.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}) do histórico?`,
    async ()=>{
      a.historico.splice(hIdx,1);
      await save(a);
      const item = document.getElementById('histitem'+hIdx);
      if(item) item.remove();
      const tabBtn = document.querySelector('.dtab:nth-child(3)');
      if(tabBtn) tabBtn.textContent = `📦 Histórico (${a.historico.length})`;
    }
  );
}

function toggleHistAulas(btn){
  const id = btn.getAttribute('data-hid');
  const el = document.getElementById(id);
  const aberto = el.style.display === 'block';
  el.style.display = aberto ? 'none' : 'block';
  btn.textContent = aberto ? 'Ver aulas ▾' : 'Fechar ▴';
}

function detailTab(tab, btn){
  ['resumo','aulas','historico'].forEach(p=>{
    document.getElementById('dpanel-'+p).style.display = p===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('dtab-active'));
  btn.classList.add('dtab-active');
}

function closeDetail(){document.getElementById('detailModal').classList.remove('open');renderBoard();renderAll();}

function toggleAula(id,idx,val){
  const a=alunos.find(x=>x.id===id);
  a.aulas[idx].done=val;
  if(val&&!a.aulas[idx].date) a.aulas[idx].date=new Date().toISOString().split('T')[0];
  save(a);
}
function setAulaDate(id,idx,val){const a=alunos.find(x=>x.id===id);a.aulas[idx].date=val;save(a);}
function deletarAluno(){
  confirmar(
    `Excluir este aluno permanentemente?`,
    async ()=>{
      await db.collection('alunos').doc(viewingId).delete();
      alunos=alunos.filter(a=>a.id!==viewingId);
      closeDetail();
    }
  );
}
function editarAluno(){
  closeDetail();editingId=viewingId;
  const a=alunos.find(x=>x.id===editingId);
  document.getElementById('modalTitle').textContent='Editar aluno';
  document.getElementById('f_nome').value=a.nome;
  atualizarSelectTipo(a.tipo);
  document.getElementById('f_status').value=a.status;
  document.getElementById('f_qtdAulas').value=a.qtdAulas;
  document.getElementById('f_valor').value=a.valor;
  document.getElementById('f_dataPag').value=a.dataPag;
  document.getElementById('f_numPacote').value=a.numPacote;
  document.getElementById('f_obs').value=a.obs;
  gerarAulas();
  document.getElementById('newModal').classList.add('open');
}

// ─────────────── RENOVAR PACOTE ───────────────
function abrirRenovar(){
  renovandoId=viewingId;
  const a=alunos.find(x=>x.id===renovandoId);
  const done=a.aulas.filter(x=>x.done).length;
  document.getElementById('renovInfo').innerHTML=
    `<b>${a.nome}</b><br>Pacote atual: nº ${a.numPacote} — ${done}/${a.aulas.length} aulas concluídas<br>
     Ao confirmar, o pacote atual será arquivado no histórico e um novo pacote será criado.`;
  document.getElementById('rv_qtd').value=a.qtdAulas;
  document.getElementById('rv_valor').value=a.valor;
  document.getElementById('rv_data').value=new Date().toISOString().split('T')[0];
  closeDetail();
  document.getElementById('renovarModal').classList.add('open');
}
function closeRenovar(){document.getElementById('renovarModal').classList.remove('open');}
async function confirmarRenovar(){
  const a=alunos.find(x=>x.id===renovandoId);
  const done=a.aulas.filter(x=>x.done).length;
  (a.historico=a.historico||[]).push({
    numPacote:a.numPacote, qtdAulas:a.qtdAulas, valor:a.valor,
    dataPag:a.dataPag, aulasConcluidas:done,
    aulas: a.aulas.map(au=>({...au}))
  });
  const novoQtd=parseInt(document.getElementById('rv_qtd').value)||a.qtdAulas;
  a.numPacote=a.numPacote+1;
  a.qtdAulas=novoQtd;
  a.valor=parseFloat(document.getElementById('rv_valor').value)||a.valor;
  a.dataPag=document.getElementById('rv_data').value;
  a.status='ativo';
  a.aulas=Array.from({length:novoQtd},(_,i)=>({label:`Aula ${i+1}`,done:false,date:''}));
  await save(a);
  closeRenovar();renderAll();
  alert(`✅ Pacote ${a.numPacote} criado para ${a.nome}!`);
}

// ─────────────── RELATÓRIO FINANCEIRO ───────────────
function initRelatorioControls(){
  const mesEl=document.getElementById('relMes');
  const anoEl=document.getElementById('relAno');
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  meses.forEach((m,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=m;mesEl.appendChild(o);});
  const hoje=new Date();
  mesEl.value=hoje.getMonth()+1;
  for(let y=hoje.getFullYear()-2;y<=hoje.getFullYear()+1;y++){const o=document.createElement('option');o.value=y;o.textContent=y;anoEl.appendChild(o);}
  anoEl.value=hoje.getFullYear();
}

function renderRelatorio(){
  const mes=parseInt(document.getElementById('relMes').value);
  const ano=parseInt(document.getElementById('relAno').value);
  const body=document.getElementById('relatorioBody');

  // Coleta todos os pagamentos (pacote atual + histórico)
  const pagamentos=[];
  alunos.forEach(a=>{
    const addPag=(p,nome,tipo)=>{
      if(!p.dataPag) return;
      const d=new Date(p.dataPag+'T12:00:00');
      if(d.getMonth()+1===mes && d.getFullYear()===ano) pagamentos.push({nome,tipo,numPacote:p.numPacote,qtdAulas:p.qtdAulas,valor:p.valor||0,dataPag:p.dataPag});
    };
    addPag(a,a.nome,a.tipo);
    (a.historico||[]).forEach(h=>addPag(h,a.nome,a.tipo));
  });

  if(!pagamentos.length){
    body.innerHTML=`<div class="no-data">Nenhum pagamento registrado em ${mes}/${ano}.</div>`;
    return;
  }

  const total=pagamentos.reduce((s,p)=>s+p.valor,0);
  const porTipo={personal:0,tercas:0,sabados:0};
  pagamentos.forEach(p=>porTipo[p.tipo]=(porTipo[p.tipo]||0)+p.valor);
  const maxBar=Math.max(...Object.values(porTipo),1);
  const tipoLabel={personal:'Personal',tercas:'Terças & Quintas',sabados:'Sábados'};
  const tipoClass={personal:'tipo-personal',tercas:'tipo-tercas',sabados:'tipo-sabados'};

  body.innerHTML=`
    <div class="cards-grid">
      <div class="kpi-card"><div class="kpi-value">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="kpi-label">Receita total</div><div class="kpi-sub">${pagamentos.length} pagamento(s)</div></div>
      <div class="kpi-card"><div class="kpi-value">R$ ${porTipo.personal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="kpi-label">Personal</div><div class="kpi-sub">${pagamentos.filter(p=>p.tipo==='personal').length} pag.</div></div>
      <div class="kpi-card"><div class="kpi-value">R$ ${porTipo.tercas.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="kpi-label">Terças & Quintas</div><div class="kpi-sub">${pagamentos.filter(p=>p.tipo==='tercas').length} pag.</div></div>
      <div class="kpi-card"><div class="kpi-value">R$ ${porTipo.sabados.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="kpi-label">Sábados</div><div class="kpi-sub">${pagamentos.filter(p=>p.tipo==='sabados').length} pag.</div></div>
    </div>

    <div class="rel-section-title">Distribuição por tipo</div>
    <div class="bar-chart">
      ${Object.entries(porTipo).map(([tipo,val])=>`
        <div class="bar-row">
          <div class="bar-name">${tipoLabel[tipo]}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(val/maxBar*100)}%">${val>0?'R$ '+val.toLocaleString('pt-BR'):''}</div></div>
        </div>`).join('')}
    </div>

    <div class="rel-section-title">Detalhamento</div>
    <table class="rel-table">
      <thead><tr><th>Aluno</th><th>Tipo</th><th>Pacote</th><th>Aulas</th><th>Data</th><th style="text-align:right">Valor</th></tr></thead>
      <tbody>
        ${pagamentos.sort((a,b)=>new Date(a.dataPag)-new Date(b.dataPag)).map(p=>`
          <tr>
            <td>${p.nome}</td>
            <td><span class="tipo-badge ${tipoClass[p.tipo]}">${tipoLabel[p.tipo]}</span></td>
            <td style="color:var(--text-muted);">nº ${p.numPacote}</td>
            <td style="color:var(--text-muted);">${p.qtdAulas}</td>
            <td style="color:var(--text-muted);">${fmtDate(p.dataPag)}</td>
            <td style="text-align:right;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);">R$ ${p.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
          </tr>`).join('')}
        <tr style="font-weight:600;">
          <td colspan="5" style="color:var(--text-muted);font-size:12px;letter-spacing:.06em;text-transform:uppercase;">Total do mês</td>
          <td style="text-align:right;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
        </tr>
      </tbody>
    </table>`;
}

// ─────────────── UTILS ───────────────
function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  const months=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${parseInt(day)} de ${months[parseInt(m)-1]}. ${y}`;
}
function exportData(){
  const blob=new Blob([JSON.stringify(alunos,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='alunos-yogacomnorber.json';a.click();
}

// close on overlay click
['newModal','detailModal','renovarModal','confirmModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id) document.getElementById(id).classList.remove('open');});
});
</script>
